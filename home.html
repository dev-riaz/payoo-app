<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Home</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body>
    <section class="min-h-screen max-w-md bg-base-200 mx-auto border">
        <!-- navbar -->
        <div class="navbar shadow-sm sticky top-0 bg-base-200">
            <div class="navbar-start space-x-2">
                <img class="w-20" src="./assets/logo.png" alt="">
                <div class="">
                    <h1 class="text-[#080808] text-[18px] font-extrabold">$<span id="balance">45000</span></h1>
                    <p class="text-[#08080851] text-[14px]">Available Balance</p>
                </div>
            </div>
            <div class="navbar-end">
                <a href="./index.html" class="btn btn-soft btn-primary">Log Out <i
                        class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </div>
        <!-- home page -->
        <div class="p-4 space-y-4">
            <h1 class="text-2xl text-[#080808] font-bold">Welcome to Pay<span class="text-[#7460FF]">oo</span></h1>
            <p class="text-[#08080849]">Enjoy easy and convenient financial services with us. Cashout charge is low
                and</p>
            <div class="grid grid-cols-3 gap-3 mt-6">
                <button onclick="showOnly('add-money')" class="btn btn-soft btn-primary flex-col py-10 rounded-xl">
                    <img src="./assets/opt-1.png" alt="">
                    <p>Add Money</p>
                </button>
                <button onclick="showOnly('cash-out')" class="btn btn-soft btn-primary flex-col py-10 rounded-xl">
                    <img src="./assets/opt-2.png" alt="">
                    <p>Cashout</p>
                </button>
                <button onclick="showOnly('transfer-money')" class="btn btn-soft btn-primary flex-col py-10 rounded-xl">
                    <img src="./assets/opt-3.png" alt="">
                    <p>Transfer Money</p>
                </button>
                <button onclick="showOnly('get-bonus')" class="btn btn-soft btn-primary flex-col py-10 rounded-xl">
                    <img src="./assets/opt-4.png" alt="">
                    <p>Get Bonus</p>
                </button>
                <button onclick="showOnly('pay-bill')" class="btn btn-soft btn-primary flex-col py-10 rounded-xl">
                    <img src="./assets/opt-5.png" alt="">
                    <p>Pay Bill</p>
                </button>
                <button onclick="showOnly('history')" class="btn btn-soft btn-primary flex-col py-10 rounded-xl">
                    <img src="./assets/opt-6.png" alt="">
                    <p>Transactions</p>
                </button>
            </div>
        </div>
        <!-- add money form -->
        <section id="add-money" class="hidden">
            <div class="p-4 space-y-4">
                <h1 class="text-[#080808] text-[18px] font-bold">Add Money</h1>
                <fieldset class="fieldset bg-white rounded-2xl mt-7 w-full p-5 space-y-2">

                    <label class="label text-[#080808] text-[16px] font-medium">Select A Bank</label>
                    <select id="add-money-bank" class="select w-full bg-base-200 border-none rounded-3xl">
                        <option disabled selected>Select back</option>
                        <option value="DBBL">DBBL</option>
                        <option value="IBBL">IBBL</option>
                        <option value="City">City bank</option>
                    </select>

                    <label class="label text-[#080808] text-[16px] font-medium">Bank Account Number</label>
                    <input id="bank-number" type="number" maxlength="11"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 11 digit account number" />

                    <label class="label text-[#080808] text-[16px] font-medium">Amount to Add</label>
                    <input id="addmoney-amount" type="number"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Add Amount to withdraw" />

                    <label class="label text-[#080808] text-[16px] font-medium">Pin Number</label>
                    <input id="addmoney-pin" type="password" maxlength="4"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 4 digit pin number" />

                    <button id="addmoney-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
                </fieldset>
            </div>
        </section>
        <!-- cash out form -->
        <section id="cash-out" class="hidden">
            <div class="p-4 space-y-4">
                <h1 class="text-[#080808] text-[18px] font-bold">Cash Out</h1>
                <fieldset class="fieldset bg-white rounded-2xl mt-7 w-full p-5 space-y-2">
                    <label class="label text-[#080808] text-[16px] font-medium">Agent Number</label>
                    <input id="agent-number" type="number" maxlength="11"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 11 digit number" />

                    <label class="label text-[#080808] text-[16px] font-medium">Amount</label>
                    <input id="cashout-amount" type="number"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter amount to withdraw" />

                    <label class="label text-[#080808] text-[16px] font-medium">Pin Number</label>
                    <input id="cashout-pin" type="password" maxlength="4"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 4 digit pin number" />

                    <button id="withdraw-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
                </fieldset>
            </div>
        </section>
        <!-- history form -->
        <section id="history" class="hidden">
            <div class="p-4 space-y-3">
                <h1 class="text-[#080808] text-[18px] font-bold">Transaction History</h1>
                <div class="space-y-5" id="transaction-container">
                </div>
            </div>
        </section>
        <!-- transfer money form -->
        <section id="transfer-money" class="hidden">
            <div class="p-4 space-y-4">
                <h1 class="text-[#080808] text-[18px] font-bold">Transfer Money</h1>
                <fieldset class="fieldset bg-white rounded-2xl mt-7 w-full p-5 space-y-2">
                    <label class="label text-[#080808] text-[16px] font-medium">User Account Number</label>
                    <input id="account-number" type="number" maxlength="11"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 11 digit number" />

                    <label class="label text-[#080808] text-[16px] font-medium">Amount</label>
                    <input id="send-money-amount" type="number"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter amount to transfer" />

                    <label class="label text-[#080808] text-[16px] font-medium">Pin Number</label>
                    <input id="send-money-pin" type="password" maxlength="4"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 4 digit pin number" />

                    <button id="send-money-btn" class="btn btn-primary mt-4 rounded-full">Send Now</button>
                </fieldset>
            </div>
        </section>
        <section id="get-bonus" class="hidden">
            <div class="p-4 space-y-4">
                <h1 class="text-[#080808] text-[18px] font-bold">Get Bonus</h1>
                <fieldset class="fieldset bg-white rounded-2xl mt-4 w-full p-5 space-y-2">
                    <label class="label text-[#080808] text-[16px] font-medium">Enter Bonus Coupon</label>
                    <input id="bonus-coupon" type="text" maxlength="11"
                        class="input rounded-full w-full bg-gray-400/10 border-none" placeholder="Enter your coupon" />

                    <button id="bonus-coupon-btn" class="btn btn-primary mt-4 rounded-full">Get Bonus</button>
                </fieldset>
            </div>
        </section>
        <section id="pay-bill" class="hidden">
            <div class="p-4 space-y-4">
                <h1 class="text-[#080808] text-[18px] font-bold">Pay Bill</h1>
                <fieldset class="fieldset bg-white rounded-2xl mt-7 w-full p-5 space-y-2">

                    <label class="label text-[#080808] text-[16px] font-medium">Select To Pay</label>
                    <select id="pay-money-bank" class="select w-full bg-base-200 border-none rounded-3xl">
                        <option disabled selected>Select bank</option>
                        <option value="DBBL">DBBL</option>
                        <option value="IBBL">IBBL</option>
                        <option value="City">City bank</option>
                    </select>

                    <label class="label text-[#080808] text-[16px] font-medium">Biller Account Number</label>
                    <input id="pay-bank-number" type="number" maxlength="11"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter account number" />

                    <label class="label text-[#080808] text-[16px] font-medium">AAmount to Pay</label>
                    <input id="pay-bill-amount" type="number"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Add Amount to pay" />

                    <label class="label text-[#080808] text-[16px] font-medium">Pin Number</label>
                    <input id="pay-bill-pin" type="password" maxlength="4"
                        class="input rounded-full w-full bg-gray-400/10 border-none"
                        placeholder="Enter 4 digit pin number" />

                    <button id="pay-btn" class="btn btn-primary mt-4 rounded-full">Pay Now</button>
                </fieldset>
            </div>
        </section>

    </section>
    <script src="./js/meshin.js"></script>
    <script src="./js/bonus.js"></script>
    <script src="./js/transfer.js"></script>
    <script src="./js/addmoney.js"></script>
    <script src="./js/cashout.js"></script>
</body>

</html>
